<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Painel de Viagem</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1113">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Painel Moto">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============ TEMAS ============ */
:root{
  /* escala fluida: tudo em rem, ancorado na altura da tela */
  font-size: clamp(9px, 3.4vh, 18px);
  --display:'Saira Condensed','Arial Narrow',sans-serif;
  --body:'Barlow','Helvetica Neue',sans-serif;
  --radius:0.9rem;
}

body.t-dia{
  --sky-1:#8FA9B8; --sky-2:#C9C3AE; --sky-3:#E4DCC6;
  --ridge-far:#7D8478; --ridge-near:#4A5347;
  --ink:#16191A; --muted:#4E5750;
  --accent:#A8461F; --accent-soft:rgba(168,70,31,0.16);
  --sun:#FFF3D6; --sun-glow:rgba(255,236,190,0.75);
  --mod-bg:rgba(255,255,255,0.32); --line:rgba(22,25,26,0.20);
  --strip-bg:rgba(240,238,228,0.72); --card:#EFEADC;
  --star:0;
}
body.t-tarde{
  --sky-1:#2E3340; --sky-2:#8A4A2E; --sky-3:#D2793C;
  --ridge-far:#453B36; --ridge-near:#241E1C;
  --ink:#F6ECD8; --muted:#C3A98E;
  --accent:#FF8A45; --accent-soft:rgba(255,138,69,0.16);
  --sun:#FFD9A0; --sun-glow:rgba(255,168,90,0.55);
  --mod-bg:rgba(20,16,14,0.34); --line:rgba(246,236,216,0.18);
  --strip-bg:rgba(22,16,13,0.62); --card:#1C1512;
  --star:0.35;
}
body.t-noite{
  --sky-1:#070A0E; --sky-2:#0D141B; --sky-3:#141A18;
  --ridge-far:#131A1B; --ridge-near:#080B0C;
  --ink:#F0DFC0; --muted:#9A9480;
  --accent:#E2A24A; --accent-soft:rgba(226,162,74,0.14);
  --sun:#DCE3EA; --sun-glow:rgba(190,205,220,0.30);
  --mod-bg:rgba(255,255,255,0.05); --line:rgba(240,223,192,0.15);
  --strip-bg:rgba(6,9,11,0.62); --card:#0B0F12;
  --star:1;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{
  background:var(--sky-1);
  font-family:var(--body);
  color:var(--ink);
  transition:color .8s ease, background .8s ease;
  user-select:none;
}

/* ============ CÉU ============ */
.sky{position:fixed;inset:0;z-index:0;
  background:linear-gradient(180deg,var(--sky-1) 0%,var(--sky-2) 58%,var(--sky-3) 100%);
  transition:background .8s ease;}
.sun{position:absolute;width:14vh;height:14vh;border-radius:50%;
  background:radial-gradient(circle,var(--sun) 0%,var(--sun) 34%,var(--sun-glow) 40%,transparent 72%);
  transform:translate(-50%,-50%);transition:left 1s linear,top 1s linear;}
.stars{position:absolute;inset:0;opacity:var(--star);transition:opacity 1s ease;}
.star{position:absolute;background:#F0DFC0;border-radius:50%;animation:tw 4s ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.25}50%{opacity:.9}}

.ridge{position:absolute;left:0;right:0;}
.ridge-far{bottom:24%;height:26%;background:var(--ridge-far);opacity:.75;
  clip-path:polygon(0 100%,0 62%,8% 44%,17% 66%,26% 34%,36% 58%,45% 26%,55% 54%,64% 30%,74% 58%,84% 38%,92% 60%,100% 44%,100% 100%);}
.ridge-near{bottom:0;height:30%;background:var(--ridge-near);
  clip-path:polygon(0 100%,0 52%,10% 66%,20% 46%,31% 70%,42% 50%,52% 72%,63% 48%,73% 68%,84% 52%,93% 70%,100% 56%,100% 100%);}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.20;mix-blend-mode:overlay;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 1px,transparent 1px 3px);}

/* ============ ESTRUTURA ============ */
.panel{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
  padding:1.1rem 1.5rem;gap:.9rem;}

.bar{display:flex;align-items:center;justify-content:space-between;
  font-family:var(--display);font-weight:600;font-size:1.15rem;
  letter-spacing:.2em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.brand{display:flex;align-items:center;gap:.55rem;}
.dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--accent);
  box-shadow:0 0 .6rem var(--accent);animation:pulse 3.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.batt{font-variant-numeric:tabular-nums;}

.grid{flex:1;display:flex;gap:1rem;min-height:0;}
.col{display:flex;flex-direction:column;gap:.9rem;min-width:0;}

.module{background:var(--mod-bg);border:1px solid var(--line);border-radius:var(--radius);
  position:relative;overflow:hidden;transition:background .8s ease,border-color .8s ease;}
.module::before{content:"";position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,transparent,var(--line),transparent);}
.m-label{font-family:var(--display);font-size:1.05rem;font-weight:600;letter-spacing:.2em;
  text-transform:uppercase;color:var(--muted);white-space:nowrap;}

/* --- módulo principal --- */
.primary{flex:1.5;display:flex;flex-direction:column;justify-content:center;
  padding:0 1.4rem;min-width:0;}
.p-value{font-family:var(--display);font-weight:700;font-size:6.6rem;line-height:.88;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em;white-space:nowrap;
  margin-top:.2rem;text-shadow:0 .2rem 1.4rem rgba(0,0,0,.30);}
.p-value .unit{font-size:.24em;font-weight:600;color:var(--muted);margin-left:.12em;letter-spacing:.06em;}
.p-value .sec{font-size:.28em;font-weight:600;color:var(--accent);margin-left:.12em;}
.speed-row{display:flex;align-items:baseline;gap:.7rem;margin-top:.9rem;padding-top:.8rem;
  border-top:1px solid var(--line);white-space:nowrap;}
.sp-label{font-family:var(--display);font-size:1rem;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--ink);opacity:.62;}
.sp-value{font-family:var(--display);font-weight:700;font-size:3.4rem;line-height:1;
  font-variant-numeric:tabular-nums;color:var(--ink);opacity:.45;
  transition:opacity .4s ease,color .4s ease;}
.sp-value.rodando{opacity:1;color:var(--accent);}
.sp-state{font-size:1.1rem;color:var(--ink);opacity:.55;letter-spacing:.02em;
  overflow:hidden;text-overflow:ellipsis;}

/* --- coluna do meio --- */
.mid{flex:1.05;min-width:0;}
.weather{flex:1.05;padding:.9rem 1rem;display:flex;flex-direction:column;justify-content:center;gap:.15rem;}
.w-top{display:flex;align-items:baseline;gap:.6rem;}
.w-temp{font-family:var(--display);font-weight:700;font-size:3.4rem;line-height:1.05;
  font-variant-numeric:tabular-nums;}
.w-feels{font-size:1.15rem;color:var(--muted);white-space:nowrap;}
.w-desc{font-size:1.3rem;color:var(--ink);opacity:.9;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}
.w-wind{font-size:1.15rem;color:var(--muted);letter-spacing:.02em;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;}

.rain{flex:1;padding:.9rem 1rem .7rem;display:flex;flex-direction:column;justify-content:space-between;}
.bars{display:flex;align-items:flex-end;gap:.35rem;height:2.9rem;margin-top:.5rem;}
.bar-wrap{flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;}
.bar-fill{width:100%;background:var(--muted);border-radius:.15rem .15rem 0 0;height:4%;
  transition:height .9s cubic-bezier(.22,1,.36,1),background .4s ease;opacity:.5;}
.bar-fill.wet{background:var(--accent);opacity:1;}
.hours{display:flex;gap:.35rem;margin-top:.35rem;}
.hours span{flex:1;text-align:center;font-size:.95rem;color:var(--muted);
  font-variant-numeric:tabular-nums;}

/* --- botão maps --- */
.cta{flex:.8;padding:0 .6rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;
  text-decoration:none;color:var(--ink);background:var(--accent-soft);
  border:1px solid var(--accent);cursor:pointer;
  transition:transform .12s ease,background .12s ease;}
.cta:active{transform:scale(.975);background:var(--accent);}
.cta-icon{width:3.2rem;height:3.2rem;stroke:var(--accent);fill:none;stroke-width:1.7;
  stroke-linecap:round;stroke-linejoin:round;}
.cta-label{font-family:var(--display);font-weight:700;font-size:1.55rem;letter-spacing:.04em;
  text-transform:uppercase;white-space:nowrap;}
.cta-sub{font-size:1.05rem;color:var(--muted);letter-spacing:.03em;white-space:nowrap;}

/* ============ RODAPÉ ============ */
.strip{display:flex;align-items:center;gap:1.5rem;height:3.9rem;padding:0 1.1rem;flex-shrink:0;
  background:var(--strip-bg);border:1px solid var(--line);border-radius:var(--radius);
  transition:background .8s ease;}
.stat{display:flex;flex-direction:column;gap:.15rem;flex-shrink:0;}
.stat .k{font-family:var(--display);font-size:1rem;letter-spacing:.18em;font-weight:600;
  text-transform:uppercase;color:var(--ink);opacity:.62;white-space:nowrap;}
.stat .v{font-family:var(--display);font-weight:600;font-size:1.9rem;line-height:1;
  font-variant-numeric:tabular-nums;white-space:nowrap;}
.stat .v small{font-size:.52em;color:var(--ink);opacity:.55;font-weight:500;margin-left:.15em;}
.trip{position:relative;}
.trip.holding .v{color:var(--accent);}

.daylight{flex:1;display:flex;flex-direction:column;gap:.45rem;min-width:0;}
.dl-top{display:flex;justify-content:space-between;gap:.8rem;font-family:var(--display);
  font-size:1rem;letter-spacing:.16em;font-weight:600;text-transform:uppercase;
  color:var(--ink);opacity:.62;white-space:nowrap;}
.dl-top span:last-child{overflow:hidden;text-overflow:ellipsis;}
.dl-track{height:.35rem;background:var(--line);border-radius:99px;overflow:hidden;}
.dl-fill{height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--accent),var(--sun));
  transition:width 1.2s cubic-bezier(.22,1,.36,1);}

/* ============ IGNIÇÃO ============ */
.module,.strip>*{opacity:0;transform:translateY(.6rem);
  animation:rise .55s cubic-bezier(.22,1,.36,1) forwards;}
.primary{animation-delay:.05s}
.mid{animation-delay:.14s}
.cta{animation-delay:.22s}
.strip>*:nth-child(1){animation-delay:.30s}
.strip>*:nth-child(2){animation-delay:.36s}
.strip>*:nth-child(3){animation-delay:.42s}
@keyframes rise{to{opacity:1;transform:none;}}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;}
  .module,.strip>*{opacity:1;transform:none;}
}

/* ============ HISTÓRICO ============ */
.sheet{position:fixed;inset:0;z-index:9;background:rgba(0,0,0,.6);
  display:flex;align-items:center;justify-content:center;padding:1rem;}
.sheet[hidden]{display:none;}
.sheet-card{width:min(100%,44rem);max-height:100%;display:flex;flex-direction:column;
  background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:1rem 1.2rem;gap:.7rem;}
.sheet-head{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;}
.sheet-head h2{font-family:var(--display);font-size:1.5rem;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--ink);}
.sheet-total{font-family:var(--display);font-size:1.15rem;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.7;}
.sheet-total b{font-size:1.5rem;font-weight:700;opacity:1;}
.sheet-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
.row{display:flex;align-items:baseline;gap:.8rem;padding:.45rem 0;
  border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:0;}
.row .d{flex:1;font-size:1.2rem;color:var(--ink);opacity:.8;text-transform:capitalize;}
.row .km{font-family:var(--display);font-weight:700;font-size:1.5rem;
  font-variant-numeric:tabular-nums;color:var(--ink);}
.row .vx{width:6.5rem;text-align:right;font-size:1.1rem;color:var(--ink);opacity:.55;
  font-variant-numeric:tabular-nums;}
.row.hoje .km{color:var(--accent);}
.vazio{padding:1.2rem 0;font-size:1.2rem;color:var(--ink);opacity:.55;}
.sheet-actions{display:flex;gap:.6rem;}
.sheet-actions button{flex:1;padding:.6rem;background:transparent;cursor:pointer;
  border:1px solid var(--line);border-radius:.5rem;color:var(--ink);
  font-family:var(--display);font-size:1.15rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;}
.sheet-actions button.perigo{border-color:var(--accent);color:var(--accent);}
.sheet-actions button:active{background:var(--accent-soft);}
</style>
</head>
<body class="t-dia">

<div class="sky">
  <div class="stars" id="stars"></div>
  <div class="sun" id="sun" style="left:50%;top:30%"></div>
  <div class="ridge ridge-far"></div>
  <div class="ridge ridge-near"></div>
</div>
<div class="grain"></div>

<main class="panel">

  <header class="bar">
    <span class="brand"><i class="dot"></i><span id="brandTxt">Painel de bordo</span></span>
    <span class="date" id="dateRow">—</span>
    <span class="batt" id="batt">—</span>
  </header>

  <section class="grid">

    <div class="module primary">
      <div class="m-label">Hora</div>
      <div class="p-value" id="clockValue">--:--</div>
      <div class="speed-row">
        <span class="sp-label">Vel</span>
        <span class="sp-value" id="speedValue">0<span class="unit">km/h</span></span>
        <span class="sp-state" id="speedState">sem GPS</span>
      </div>
    </div>

    <div class="col mid">
      <div class="module weather">
        <div class="m-label">Tempo agora</div>
        <div class="w-top">
          <span class="w-temp" id="wTemp">--°</span>
          <span class="w-feels" id="wFeels">sensação --°</span>
        </div>
        <div class="w-desc" id="wDesc">sem dados</div>
        <div class="w-wind" id="wWind">vento --</div>
      </div>

      <div class="module rain">
        <div class="m-label">Chuva · 6h</div>
        <div class="bars" id="bars"></div>
        <div class="hours" id="hours"></div>
      </div>
    </div>

    <a class="module cta" id="mapsBtn" href="https://www.google.com/maps">
      <svg class="cta-icon" viewBox="0 0 24 24">
        <path d="M21 10c0 6-9 12-9 12S3 16 3 10a9 9 0 1 1 18 0z"></path>
        <circle cx="12" cy="10" r="3"></circle>
      </svg>
      <span class="cta-label">Abrir Maps</span>
      <span class="cta-sub">Toque para navegar</span>
    </a>

  </section>

  <footer class="strip">
    <div class="stat trip" id="tripBox">
      <span class="k">Trecho</span>
      <span class="v" id="tripVal">0,0<small>km</small></span>
    </div>
    <div class="stat">
      <span class="k">Altitude</span>
      <span class="v" id="altVal">—<small>m</small></span>
    </div>
    <div class="daylight">
      <div class="dl-top"><span id="dlLabel">Luz do dia</span><span id="dlRight">—</span></div>
      <div class="dl-track"><div class="dl-fill" id="dlFill"></div></div>
    </div>
  </footer>

</main>

<div class="sheet" id="sheet" hidden>
  <div class="sheet-card">
    <div class="sheet-head">
      <h2>Deslocamento</h2>
      <div class="sheet-total">Total <b id="shTotal">0</b> km</div>
    </div>
    <div class="sheet-list" id="shList"></div>
    <div class="sheet-actions">
      <button id="shCopy">Copiar</button>
      <button id="shReset" class="perigo">Zerar trecho</button>
      <button id="shClose">Fechar</button>
    </div>
  </div>
</div>

<script>
"use strict";

const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');

/* ---------- estado ---------- */
let sunrise = null, sunset = null;      // objetos Date do dia atual
let lastFix = null;                     // última posição do GPS
let trip = parseFloat(localStorage.getItem('tripKm') || '0');
let total = parseFloat(localStorage.getItem('odoTotal') || '0');
let diario = {};
try{ diario = JSON.parse(localStorage.getItem('diario') || '{}'); }catch(e){ diario = {}; }

// pede ao Android para não descartar os dados salvos
if(navigator.storage && navigator.storage.persist){ navigator.storage.persist().catch(()=>{}); }

function chaveHoje(d){
  d = d || new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

let salvarPendente = false;
function salvaTudo(agora){
  if(!agora){
    if(salvarPendente) return;
    salvarPendente = true;
    setTimeout(() => { salvarPendente = false; salvaTudo(true); }, 5000);
    return;
  }
  try{
    // mantém os 90 dias mais recentes
    const chaves = Object.keys(diario).sort();
    while(chaves.length > 90){ delete diario[chaves.shift()]; }
    localStorage.setItem('tripKm', trip.toFixed(3));
    localStorage.setItem('odoTotal', total.toFixed(3));
    localStorage.setItem('diario', JSON.stringify(diario));
  }catch(e){}
}

function registraTrecho(km, vel){
  const k = chaveHoje();
  const dia = diario[k] || {km:0, vmax:0};
  dia.km += km;
  if(vel && vel > dia.vmax) dia.vmax = vel;
  diario[k] = dia;
  total += km;
  salvaTudo();
}

// salva na hora se o app for fechado ou for para segundo plano
window.addEventListener('pagehide', () => salvaTudo(true));
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden') salvaTudo(true);
});
let speedKmh = 0;
let lastMoveAt = 0;

/* ---------- estrelas (uma vez) ---------- */
(function stars(){
  const box = $('stars');
  let html = '';
  for(let i=0;i<46;i++){
    const s = (Math.random()*1.6+0.8).toFixed(1);
    html += '<i class="star" style="left:'+(Math.random()*100).toFixed(1)+'%;top:'+
            (Math.random()*62).toFixed(1)+'%;width:'+s+'px;height:'+s+'px;animation-delay:'+
            (Math.random()*4).toFixed(1)+'s"></i>';
  }
  box.innerHTML = html;
})();

/* ---------- céu: tema + posição do sol ---------- */
function minutes(d){ return d.getHours()*60 + d.getMinutes(); }

function updateSky(){
  const now = new Date();
  const m = minutes(now);
  const rise = sunrise ? minutes(sunrise) : 6*60;
  const set  = sunset  ? minutes(sunset)  : 18*60+30;

  let tema;
  if(m < rise - 40 || m > set + 40)            tema = 't-noite';
  else if(m < rise + 60 || m > set - 70)       tema = 't-tarde';
  else                                          tema = 't-dia';
  if(!document.body.classList.contains(tema)){
    document.body.className = tema;
    const cor = tema === 't-dia' ? '#8FA9B8' : tema === 't-tarde' ? '#2E3340' : '#0E1113';
    const meta = document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content', cor);
  }

  // sol/lua percorre o arco entre nascer e pôr do sol
  let p = (m - rise) / Math.max(set - rise, 1);
  let arco = true;
  if(p < 0 || p > 1){ // noite: a lua faz o caminho inverso
    const noite = (m > set) ? (m - set) : (m + 1440 - set);
    const dur = (rise + 1440 - set);
    p = noite / dur;
    arco = false;
  }
  p = Math.min(Math.max(p,0),1);
  const x = 6 + p*88;
  const y = arco ? (52 - Math.sin(p*Math.PI)*40) : (30 - Math.sin(p*Math.PI)*14);
  const sun = $('sun');
  sun.style.left = x.toFixed(1)+'%';
  sun.style.top  = y.toFixed(1)+'%';

  // barra de luz restante
  if(m >= rise && m <= set){
    const rest = set - m;
    $('dlLabel').textContent = 'Luz do dia';
    $('dlRight').textContent = Math.floor(rest/60)+'h'+pad(rest%60)+' até o pôr do sol';
    $('dlFill').style.width = ((m-rise)/(set-rise)*100).toFixed(1)+'%';
  } else {
    const falta = m < rise ? (rise - m) : (rise + 1440 - m);
    $('dlLabel').textContent = 'Noite';
    $('dlRight').textContent = 'nasce o sol em '+Math.floor(falta/60)+'h'+pad(falta%60);
    $('dlFill').style.width = '100%';
  }
}

/* ---------- display principal: hora quando parado, velocidade quando rodando ---------- */
function updateMain(){
  const now = new Date();

  // relógio: posição fixa, sempre visível
  $('clockValue').innerHTML = pad(now.getHours())+':'+pad(now.getMinutes())+
    '<span class="sec">'+pad(now.getSeconds())+'</span>';

  // velocidade: linha própria, logo abaixo
  const rodando = (Date.now() - lastMoveAt) < 9000 && speedKmh >= 3;
  const vel = $('speedValue');
  vel.innerHTML = Math.round(rodando ? speedKmh : 0) + '<span class="unit">km/h</span>';
  vel.classList.toggle('rodando', rodando);
  $('speedState').textContent = rodando ? 'rodando' : (lastFix ? 'parado' : 'sem GPS');

  const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  $('dateRow').textContent = dias[now.getDay()]+' '+now.getDate()+' '+meses[now.getMonth()];
}

/* ---------- GPS: velocidade, altitude, odômetro ---------- */
function haversine(a, b){
  const R = 6371, rad = Math.PI/180;
  const dLat = (b.lat-a.lat)*rad, dLon = (b.lon-a.lon)*rad;
  const s = Math.sin(dLat/2)**2 +
            Math.cos(a.lat*rad)*Math.cos(b.lat*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function onFix(pos){
  const c = pos.coords;
  const agora = { lat:c.latitude, lon:c.longitude, t:pos.timestamp };

  // velocidade: usa a do GPS; se vier vazia, calcula pela distância
  let v = (c.speed !== null && !isNaN(c.speed)) ? c.speed*3.6 : null;

  if(lastFix){
    const d = haversine(lastFix, agora);           // km
    const dt = (agora.t - lastFix.t)/1000;         // s
    if(v === null && dt > 0) v = (d/dt)*3600;
    // só soma no odômetro se o deslocamento for plausível (ignora ruído parado)
    if(d > 0.004 && d < 1 && dt > 0 && (d/dt)*3600 < 220){
      trip += d;
      registraTrecho(d, (c.speed !== null && !isNaN(c.speed)) ? c.speed*3.6 : (d/dt)*3600);
      $('tripVal').innerHTML = trip.toFixed(1).replace('.',',')+'<small>km</small>';
    }
  }

  if(v !== null){
    speedKmh = Math.max(0, v);
    if(speedKmh >= 3) lastMoveAt = Date.now();
  }
  if(c.altitude !== null && !isNaN(c.altitude)){
    $('altVal').innerHTML = Math.round(c.altitude)+'<small>m</small>';
  }
  lastFix = agora;

  if(!fetchWeather.feito){ fetchWeather(agora.lat, agora.lon); fetchWeather.feito = true; }
}

if('geolocation' in navigator){
  navigator.geolocation.watchPosition(onFix, () => {}, {
    enableHighAccuracy:true, maximumAge:2000, timeout:15000
  });
}

/* ---------- odômetro: segurar para zerar ---------- */
function zeraTrecho(){
  trip = 0;
  salvaTudo(true);
  $('tripVal').innerHTML = '0,0<small>km</small>';
  if(navigator.vibrate) navigator.vibrate(40);
}

(function resetTrip(){
  const box = $('tripBox');
  let timer = null, segurou = false;
  const start = () => {
    segurou = false;
    box.classList.add('holding');
    timer = setTimeout(() => {
      segurou = true;
      zeraTrecho();
      box.classList.remove('holding');
    }, 1200);
  };
  const stop = () => {
    clearTimeout(timer);
    box.classList.remove('holding');
    if(!segurou) abreHistorico();   // toque curto abre o histórico
  };
  box.addEventListener('touchstart', start, {passive:true});
  box.addEventListener('touchend', stop);
  box.addEventListener('touchcancel', stop);
  box.addEventListener('mousedown', start);
  box.addEventListener('mouseup', stop);
  box.addEventListener('mouseleave', stop);
})();

/* ---------- histórico de deslocamento ---------- */
function rotuloData(chave){
  const [a,m,d] = chave.split('-').map(Number);
  const dt = new Date(a, m-1, d);
  const dias = ['dom','seg','ter','qua','qui','sex','sáb'];
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return dias[dt.getDay()]+' '+d+' '+meses[m-1];
}

function textoHistorico(){
  const chaves = Object.keys(diario).sort().reverse();
  let txt = 'Deslocamento — total '+total.toFixed(1).replace('.',',')+' km\n';
  chaves.forEach(k => {
    txt += rotuloData(k)+' · '+diario[k].km.toFixed(1).replace('.',',')+' km';
    if(diario[k].vmax) txt += ' · máx '+Math.round(diario[k].vmax)+' km/h';
    txt += '\n';
  });
  return txt;
}

function abreHistorico(){
  const chaves = Object.keys(diario).sort().reverse();
  const hoje = chaveHoje();
  $('shTotal').textContent = total.toFixed(1).replace('.',',');
  $('shList').innerHTML = chaves.length
    ? chaves.map(k =>
        '<div class="row'+(k===hoje?' hoje':'')+'">'+
          '<span class="d">'+rotuloData(k)+(k===hoje?' · hoje':'')+'</span>'+
          '<span class="km">'+diario[k].km.toFixed(1).replace('.',',')+' km</span>'+
          '<span class="vx">'+(diario[k].vmax?'máx '+Math.round(diario[k].vmax):'—')+'</span>'+
        '</div>').join('')
    : '<div class="vazio">Nenhum deslocamento registrado ainda. Assim que o GPS pegar e a moto andar, os dias aparecem aqui.</div>';
  $('sheet').hidden = false;
}

$('shClose').addEventListener('click', () => { $('sheet').hidden = true; });
$('sheet').addEventListener('click', e => { if(e.target.id === 'sheet') $('sheet').hidden = true; });
$('shReset').addEventListener('click', () => { zeraTrecho(); $('sheet').hidden = true; });
$('shCopy').addEventListener('click', () => {
  const txt = textoHistorico();
  const ok = () => { $('shCopy').textContent = 'Copiado'; setTimeout(()=>{ $('shCopy').textContent='Copiar'; },1600); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok).catch(()=>{});
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); ok(); }catch(e){}
    document.body.removeChild(ta);
  }
});

/* ---------- clima ---------- */
const wmo = {
  0:'céu limpo',1:'poucas nuvens',2:'parcialmente nublado',3:'nublado',
  45:'neblina',48:'neblina gelada',51:'garoa leve',53:'garoa',55:'garoa forte',
  56:'garoa gelada',57:'garoa gelada',61:'chuva leve',63:'chuva',65:'chuva forte',
  66:'chuva gelada',67:'chuva gelada',71:'neve leve',73:'neve',75:'neve forte',
  77:'granizo fino',80:'pancada de chuva',81:'pancada forte',82:'chuva intensa',
  85:'pancada de neve',86:'nevasca',95:'tempestade',96:'tempestade c/ granizo',99:'tempestade forte'
};

function pintaClima(d){
  if(d.temp !== undefined) $('wTemp').textContent = Math.round(d.temp)+'°';
  if(d.feels !== undefined) $('wFeels').textContent = 'sensação '+Math.round(d.feels)+'°';
  if(d.code !== undefined) $('wDesc').textContent = wmo[d.code] || '—';
  if(d.wind !== undefined) $('wWind').textContent = 'vento '+Math.round(d.wind)+' km/h';

  if(d.chuva && d.chuva.length){
    const bars = $('bars'), hours = $('hours');
    if(!bars.children.length){
      bars.innerHTML = d.chuva.map(() => '<div class="bar-wrap"><div class="bar-fill"></div></div>').join('');
      hours.innerHTML = d.chuva.map(h => '<span>'+h.hora+'</span>').join('');
    }
    [...bars.querySelectorAll('.bar-fill')].forEach((el,i) => {
      const p = d.chuva[i] ? d.chuva[i].prob : 0;
      el.style.height = Math.max(4, p) + '%';
      el.classList.toggle('wet', p >= 40);
    });
  }

  if(d.sunrise) sunrise = new Date(d.sunrise);
  if(d.sunset)  sunset  = new Date(d.sunset);
  updateSky();
}

function fetchWeather(lat, lon){
  const url = 'https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+
    '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m'+
    '&hourly=precipitation_probability&daily=sunrise,sunset'+
    '&forecast_days=2&timezone=auto';

  fetch(url).then(r => r.json()).then(j => {
    const agora = new Date();
    let chuva = [];
    if(j.hourly && j.hourly.time){
      const i0 = j.hourly.time.findIndex(t => new Date(t) > agora);
      for(let i = Math.max(i0,0); i < Math.max(i0,0)+6 && i < j.hourly.time.length; i++){
        chuva.push({
          hora: pad(new Date(j.hourly.time[i]).getHours())+'h',
          prob: j.hourly.precipitation_probability[i] ?? 0
        });
      }
    }
    const dados = {
      temp:  j.current && j.current.temperature_2m,
      feels: j.current && j.current.apparent_temperature,
      code:  j.current && j.current.weather_code,
      wind:  j.current && j.current.wind_speed_10m,
      chuva: chuva,
      sunrise: j.daily && j.daily.sunrise && j.daily.sunrise[0],
      sunset:  j.daily && j.daily.sunset  && j.daily.sunset[0],
      salvoEm: Date.now()
    };
    localStorage.setItem('clima', JSON.stringify(dados));
    pintaClima(dados);
  }).catch(carregaClimaSalvo);
}

function carregaClimaSalvo(){
  try{
    const d = JSON.parse(localStorage.getItem('clima'));
    if(d){
      pintaClima(d);
      const h = Math.round((Date.now() - (d.salvoEm||0))/3600000);
      $('wWind').textContent = 'vento '+Math.round(d.wind||0)+' km/h · sem sinal'+(h?' ('+h+'h)':'');
    } else {
      $('wDesc').textContent = 'sem sinal';
    }
  }catch(e){ $('wDesc').textContent = 'sem sinal'; }
}
carregaClimaSalvo();

// tenta atualizar mesmo antes do primeiro fix do GPS, usando a última posição salva
setInterval(() => {
  if(lastFix) fetchWeather(lastFix.lat, lastFix.lon);
}, 15*60*1000);

/* ---------- bateria ---------- */

    };

async function keepAwake(){

}
keepAwake();
document.addEventListener('visibilitychange', () => {
